name: manifest-v5

on:
  push:
    paths:
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "proto/**"
      - "tools/manifest-v5/**"
      - ".github/workflows/manifest-v5.yml"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "proto/**"
      - "tools/manifest-v5/**"
      - ".github/workflows/manifest-v5.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: install
        run: pnpm install --frozen-lockfile

      - name: regenerate protobufjs output
        run: pnpm --filter @esp-control-ble/manifest-v5 run proto:gen:ts

      - name: fail if generated output changed
        run: git diff --exit-code -- tools/manifest-v5/src/generated

      - name: typecheck
        run: pnpm --filter @esp-control-ble/manifest-v5 typecheck

      - name: test
        run: pnpm --filter @esp-control-ble/manifest-v5 test

      - name: compile demo fixture
        run: pnpm --filter @esp-control-ble/manifest-v5 run compile -- --source tools/manifest-v5/tests/fixtures/demo.manifest.ts --out tools/manifest-v5/.tmp/manifest_v5_demo.pb

      - uses: actions/upload-artifact@v4
        with:
          name: manifest_v5_demo.pb
          path: tools/manifest-v5/.tmp/manifest_v5_demo.pb
