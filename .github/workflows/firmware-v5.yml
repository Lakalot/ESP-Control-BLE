name: Firmware V5

on:
  push:
    branches: [master]
    paths:
      - 'firmware/esp32/**'
      - 'proto/**'
  pull_request:
    paths:
      - 'firmware/esp32/**'
      - 'proto/**'

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install PlatformIO
        run: pip install platformio==6.1.15
      - name: Run native v5 tests
        run: pio test -c firmware/esp32/platformio_test.ini -e native_v5
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install PlatformIO
        run: pip install platformio==6.1.15
      - name: Download Plan A artifact
        env:
          MANIFEST_V5_ARTIFACT_URL: ${{ secrets.MANIFEST_V5_ARTIFACT_URL }}
        run: echo "using $MANIFEST_V5_ARTIFACT_URL for embed step"
      - name: Build release env
        env:
          MANIFEST_V5_ARTIFACT_URL: ${{ secrets.MANIFEST_V5_ARTIFACT_URL }}
        run: pio run -c firmware/esp32/platformio.ini -e release
