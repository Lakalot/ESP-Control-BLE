version: 5
schemaVersion: 1
minAppVersion: 1.0.0
capabilities:
  required:
    - layout.sections
    - rules.visibility
  optional: []
appShell:
  navBar:
    items:
      - id: home
        label: Home
        icon: home
        viewId: home
      - id: stats
        label: Stats
        icon: bar-chart-2
        viewId: stats
      - id: settings
        label: Settings
        icon: settings
        viewId: settings
resources:
  - id: relay.auto
    firmwareSymbol: relay_auto
    label: Main Power
    valueType: bool
    readMode: subscribe
    staleAfterMs: 5000
  - id: light.brightness
    firmwareSymbol: light_brightness
    label: Brightness
    valueType: uint
    unit: '%'
    readMode: subscribe
    staleAfterMs: 5000
  - id: env.temperature
    firmwareSymbol: env_temperature
    label: Temperature
    valueType: float
    unit: C
    readMode: subscribe
    staleAfterMs: 5000
  - id: fan.profile
    firmwareSymbol: fan_profile
    label: Fan Profile
    valueType: enum
    readMode: subscribe
    staleAfterMs: 5000
    enumValues:
      - slow
      - normal
      - fast
  - id: system.load
    firmwareSymbol: system_load
    label: Load
    valueType: uint
    unit: '%'
    readMode: subscribe
    staleAfterMs: 3000
  - id: device.debug
    firmwareSymbol: device_debug
    label: Debug Mode
    valueType: bool
    readMode: snapshot
    staleAfterMs: 10000
  - id: env.humidity
    firmwareSymbol: env_humidity
    label: Humidity
    valueType: float
    unit: '%'
    readMode: subscribe
    staleAfterMs: 5000
  - id: wifi.rssi
    firmwareSymbol: wifi_rssi
    label: WiFi Signal
    valueType: int
    unit: dBm
    readMode: poll
    pollMs: 10000
    staleAfterMs: 15000
  - id: system.uptime
    firmwareSymbol: system_uptime
    label: Uptime
    valueType: duration_ms
    readMode: poll
    pollMs: 5000
    staleAfterMs: 10000
  - id: device.name
    firmwareSymbol: device_name
    label: Device Name
    valueType: string
    readMode: snapshot
    staleAfterMs: 60000
  - id: light.color
    firmwareSymbol: light_color
    label: Color Preset
    valueType: enum
    readMode: subscribe
    staleAfterMs: 5000
    enumValues:
      - warm_white
      - cool_white
      - red
      - green
      - blue
      - party
actions:
  - id: relay.toggle
    firmwareSymbol: relay_toggle
    label: Toggle
    dangerLevel: normal
    inputSchema:
      type: object
      additionalProperties: false
      properties: {}
  - id: light.set_brightness
    firmwareSymbol: light_set_brightness
    label: Set Brightness
    dangerLevel: normal
    inputSchema:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: integer
          minimum: 0
          maximum: 100
  - id: fan.set_profile
    firmwareSymbol: fan_set_profile
    label: Set Fan Profile
    dangerLevel: normal
    inputSchema:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: string
          enum:
            - slow
            - normal
            - fast
  - id: device.set_debug
    firmwareSymbol: device_set_debug
    label: Set Debug Mode
    dangerLevel: elevated
    inputSchema:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: boolean
  - id: system.factory_reset
    firmwareSymbol: system_factory_reset
    label: Factory Reset
    dangerLevel: dangerous
    confirm: This will erase all settings. Continue?
    inputSchema:
      type: object
      additionalProperties: false
      properties: {}
  - id: device.rename
    firmwareSymbol: device_rename
    label: Rename Device
    dangerLevel: normal
    inputSchema:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: string
          minLength: 1
          maxLength: 32
  - id: light.set_color
    firmwareSymbol: light_set_color
    label: Set Color
    dangerLevel: normal
    inputSchema:
      type: object
      additionalProperties: false
      required:
        - value
      properties:
        value:
          type: string
          enum:
            - warm_white
            - cool_white
            - red
            - green
            - blue
            - party
  - id: system.restart
    firmwareSymbol: system_restart
    label: Restart
    dangerLevel: dangerous
    confirm: Restart the device now?
    inputSchema:
      type: object
      additionalProperties: false
      properties: {}
views:
  - id: home
    firmwareSymbol: home
    title: Home
    content:
      - kind: text
        id: home.banner
        title: ESP Control
        text: BLE-connected device dashboard.
      - kind: section
        id: lighting.section
        title: Lighting
        content:
          - kind: toggle
            id: lighting.toggle
            title: Main Power
            resource: relay.auto
            action: relay.toggle
          - kind: slider
            id: lighting.slider
            title: Brightness
            resource: light.brightness
            action: light.set_brightness
            formatHint: percent
          - kind: select
            id: lighting.color
            title: Color Preset
            resource: light.color
            action: light.set_color
  - id: stats
    firmwareSymbol: stats_screen
    title: Stats
    content:
      - kind: section
        id: telemetry.section
        title: Telemetry
        content:
          - kind: stat
            id: telemetry.temp
            title: Temperature
            resource: env.temperature
            formatHint: float_2
          - kind: stat
            id: telemetry.humidity
            title: Humidity
            resource: env.humidity
            formatHint: float_1
          - kind: stat
            id: telemetry.load
            title: Load
            resource: system.load
            formatHint: percent
          - kind: select
            id: telemetry.profile
            title: Fan Profile
            resource: fan.profile
            action: fan.set_profile
      - kind: section
        id: system.section
        title: System
        content:
          - kind: row
            id: system.row
            content:
              - kind: badge
                id: system.rssi
                title: WiFi
                resource: wifi.rssi
              - kind: timer
                id: system.uptime
                title: Uptime
                resource: system.uptime
  - id: settings
    firmwareSymbol: settings_screen
    title: Settings
    content:
      - kind: section
        id: settings.section
        title: Device
        content:
          - kind: text_input
            id: settings.rename
            title: Rename Device
            resource: device.name
            action: device.rename
          - kind: button
            id: settings.restart
            title: Restart
            action: system.restart
      - kind: section
        id: advanced.section
        title: Advanced
        content:
          - kind: toggle
            id: advanced.debug
            title: Debug Mode
            resource: device.debug
            action: device.set_debug
          - kind: text
            id: advanced.note
            text: Advanced settings
          - kind: button
            id: advanced.reset
            title: Factory Reset
            action: system.factory_reset
