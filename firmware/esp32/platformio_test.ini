[platformio]
default_envs = native_v5

[env:native_v5]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DUNIT_TEST
    -DPB_FIELD_32BIT
    -Ilib/esp-control-ble/src
    -Isrc
lib_deps =
    nanopb/Nanopb@^0.4.9
    throwtheswitch/Unity@^2.5.2
lib_extra_dirs = lib/esp-control-ble-native
test_build_src = false
test_filter = native/*
