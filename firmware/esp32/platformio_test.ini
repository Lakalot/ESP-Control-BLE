[platformio]
default_envs = native
build_dir = .pio/test-build

[env:native]
platform = native
test_framework = unity
extra_scripts =
    pre:tools/configure_native_toolchain.py
build_flags =
    -std=gnu++17
    -DUNIT_TEST
    -DPB_FIELD_32BIT
    -Ilib/esp-control-ble/src
    -Isrc
    -Iapp
lib_deps =
    nanopb/Nanopb@^0.4.9
    throwtheswitch/Unity@^2.5.2
lib_extra_dirs = lib
lib_ldf_mode = deep+
test_build_src = false
test_filter = native/*
