[platformio]
default_envs = esp32dev

[env:base]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2
    etlcpp/Embedded Template Library @ ^20.40.0
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
extra_scripts = pre:tools/gen_manifest.py

[env:esp32dev]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -DCORE_DEBUG_LEVEL=3

[env:release]
extends = env:base
build_type = release
build_flags =
    ${env:base.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -Os

[env:native]
platform = native
build_flags = -std=c++11
lib_deps =
test_ignore = test_embedded_*
