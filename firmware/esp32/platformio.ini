[platformio]
default_envs = esp32dev
src_dir = app

[env:base]
platform = espressif32
board = esp32dev
framework = arduino
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
lib_deps =
    etlcpp/Embedded Template Library @ ^20.40.0
    nanopb/Nanopb@^0.4.9
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
build_flags =
    -DPB_FIELD_32BIT=1
extra_scripts =
    pre:tools/gen_nanopb.py
    pre:tools/embed_manifest.py

[env:esp32dev]
extends = env:base
build_flags =
    ${env:base.build_flags}
    -DCORE_DEBUG_LEVEL=3

[env:release]
extends = env:base
build_type = release
build_flags =
    ${env:base.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_LOG_DEFAULT_LEVEL=2
    -O2

[env:native]
platform = native
test_framework = unity
extra_scripts =
    pre:tools/configure_native_toolchain.py
build_flags =
    -std=gnu++17
    -DUNIT_TEST
    -DPB_FIELD_32BIT
    -Ilib/esp-control-ble/src
    -Isrc
    -Iapp
lib_deps =
    nanopb/Nanopb@^0.4.9
    throwtheswitch/Unity@^2.5.2
lib_extra_dirs = lib
lib_ldf_mode = deep+
test_build_src = false
test_filter = native/*
